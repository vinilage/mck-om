############################################# CA ConfigMap consumed by MongoDB / Ops Manager
# the certificates are generated by cert-manager
# this is ONLY AN EXAMPLE of the structure of the ConfigMap

apiVersion: v1
kind: ConfigMap
metadata:
  name: replica-set-ca-configmap
  namespace: mongodb
data:
  ca-pem: |
    -----BEGIN CERTIFICATE-----
    ...
    -----END CERTIFICATE-----
  mms-ca.crt: |
    -----BEGIN CERTIFICATE-----
    ...
    -----END CERTIFICATE-----
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    ...
    -----END CERTIFICATE-----