############################################# CA ConfigMap consumed by MongoDB / Ops Manager
# the certificates are generated by cert-manager
apiVersion: v1
kind: ConfigMap
metadata:
  name: mdb-rs-ca-configmap
  namespace: mongodb
data:
  ca-pem: |
    -----BEGIN CERTIFICATE-----
    MIID...
    -----END CERTIFICATE-----
  mms-ca.crt: |
    -----BEGIN CERTIFICATE-----
    MIID...
    -----END CERTIFICATE-----
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    MIID...
    -----END CERTIFICATE-----