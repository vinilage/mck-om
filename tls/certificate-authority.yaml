############################################# Bootstrap self‑signed ClusterIssuer (for CA generation)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap-issuer
spec:
  selfSigned: {}

---

############################################# Ceritificate Authority
# creates root-secret in cert-manager namespace
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: my-selfsigned-ca
  namespace: cert-manager
spec:
  isCA: true 
  commonName: my-selfsigned-ca    
  secretName: root-secret   ## create a secret with the CA certificate
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap-issuer
    kind: ClusterIssuer

---

############################################# Cluster Issuer using the CA created above
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: my-ca-issuer
spec:
  ca:
    secretName: root-secret