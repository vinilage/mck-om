apiVersion: mongodb.com/v1
kind: MongoDBOpsManager
metadata:
  name: ops-manager
  namespace: mongodb-operator
spec:
  version: "8.0.16"
  adminCredentials: om-admin-secret
  externalConnectivity:
    type: LoadBalancer
  configuration:
    mms.ignoreInitialUiSetup: "true"
    automation.versions.source: remote
    mms.adminEmailAddr: support@example.com
    mms.fromEmailAddr: support@example.com
    mms.replyToEmailAddr: support@example.com
    mms.mail.hostname: example.com
    mms.mail.port: "465"
    mms.mail.ssl: "false"
    mms.mail.transport: smtp
    # IMPORTANT: use the HTTPS URL that matches your TLS cert
    mms.baseUrl: "https://ops-manager-svc.mongodb-operator.svc.cluster.local:8080" 
    ############################# TLS
    security:
      tls:
        enabled: true
        # ConfigMap with mms-ca.crt (CA that signed the Ops Manager cert)
        ca: "om-http-cert-ca"
  
  applicationDatabase:
    members: 3
    version: "8.2.0"
    ############################# TLS
    security:
      tls:
        enabled: true
        # Usually the same CA ConfigMap if you use same CA for AppDB
        ca: "om-http-cert-ca"
