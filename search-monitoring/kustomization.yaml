apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mongodb-operator

resources:
  - search-prometheus.yaml
  - monitoring.yml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: grafana-datasources
    files:
      - grafana-configs/datasources/prometheus.yml
  - name: grafana-dashboards
    files:
      - grafana-configs/dashboards/dashboards.yml
      - grafana-configs/dashboards/mongodb-dashboard.json
